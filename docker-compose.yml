services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
      - GMAIL_USER=saumyasrivastava611@gmail.com
      - GMAIL_PASS=${GMAIL_PASS}
      - TECH_LEAD_EMAIL=saumyasrivastava611@gmail.com

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}